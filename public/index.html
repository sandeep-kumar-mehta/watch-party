<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Party 🎬</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== JOIN SCREEN ===== */
    #joinScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0f0f13;
    }

    .join-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      text-align: center;
    }

    .join-card h1 { font-size: 28px; margin-bottom: 6px; }
    .join-card p  { color: #888; font-size: 14px; margin-bottom: 28px; }

    .join-card input {
      width: 100%;
      padding: 12px 14px;
      background: #252535;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .join-card input:focus { border-color: #6c63ff; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #5a52e0; }

    .divider { margin: 20px 0; color: #444; font-size: 13px; }

    /* ===== MAIN APP ===== */
    #appScreen { display: none; height: 100vh; flex-direction: column; }

    .topbar {
      padding: 10px 20px;
      background: #1a1a24;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar h2 { font-size: 16px; font-weight: 500; }
    .room-badge {
      background: #252535;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      color: #aaa;
      cursor: pointer;
      transition: background 0.2s;
    }
    .room-badge:hover { background: #2e2e45; }
    .room-badge span { color: #6c63ff; font-weight: 600; }
    .online-pill {
      margin-left: auto;
      background: #1a3a1a;
      color: #4caf50;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
    }
    .live-dot { width: 7px; height: 7px; background: #4caf50; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .main-area { display: flex; flex: 1; overflow: hidden; }

    /* ===== VIDEO AREA ===== */
    .video-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .video-container {
      flex: 1;
      background: #000;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #mainVideo { width: 100%; height: 100%; object-fit: contain; display: none; }

    .video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: #555;
    }
    .video-placeholder .icon {
      width: 70px; height: 70px;
      background: #1a1a24;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      border: 1px solid #2a2a3a;
    }
    .video-placeholder p { font-size: 14px; line-height: 1.6; text-align: center; }

    .reaction-float {
      position: absolute;
      font-size: 28px;
      pointer-events: none;
      animation: floatUp 2s ease forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.4); }
    }

    /* ===== CONTROLS ===== */
    .progress-bar-wrap { padding: 8px 16px 4px; background: #151520; }
    .progress-bar {
      height: 5px; background: #2a2a3a; border-radius: 3px; cursor: pointer; position: relative;
    }
    .progress-fill { height: 100%; background: #6c63ff; border-radius: 3px; width: 0%; pointer-events: none; transition: width 0.1s; }

    .controls {
      padding: 10px 16px;
      background: #151520;
      border-top: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ctrl-btn {
      background: #252535;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 7px 14px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s;
    }
    .ctrl-btn:hover { background: #2e2e45; color: #fff; }
    .time-info { font-size: 12px; color: #666; margin-left: auto; font-variant-numeric: tabular-nums; }

    .reactions-bar { display: flex; gap: 8px; padding: 8px 16px; background: #151520; border-top: 1px solid #1e1e2e; }
    .react-btn {
      background: #1e1e2e; border: 1px solid #2a2a3a; border-radius: 20px;
      padding: 5px 14px; font-size: 16px; cursor: pointer; transition: transform 0.15s;
    }
    .react-btn:hover { transform: scale(1.2); background: #252535; }
    #fileInput { display: none; }

    /* ===== CHAT ===== */
    .chat-panel {
      width: 290px;
      border-left: 1px solid #2a2a3a;
      display: flex;
      flex-direction: column;
      background: #13131e;
    }
    .chat-title {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a3a;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a3a transparent;
    }
    .msg { display: flex; gap: 8px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .avatar.me     { background: #2d2060; color: #9d8fff; }
    .avatar.other  { background: #1e3a20; color: #6fcf97; }
    .avatar.system { background: #2a2a3a; color: #888; font-size: 10px; }

    .msg-body { flex: 1; min-width: 0; }
    .msg-name { font-size: 11px; color: #666; margin-bottom: 2px; }
    .msg-text { font-size: 13px; color: #ddd; line-height: 1.45; word-break: break-word; }
    .msg-time { font-size: 10px; color: #444; margin-top: 2px; }

    .system-msg { font-size: 11px; color: #555; text-align: center; padding: 3px 0; font-style: italic; }

    .chat-input-wrap {
      padding: 10px;
      border-top: 1px solid #2a2a3a;
      display: flex;
      gap: 8px;
    }
    .chat-input {
      flex: 1;
      padding: 9px 12px;
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      border-radius: 20px;
      color: #eee;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      resize: none;
      max-height: 80px;
      line-height: 1.4;
    }
    .chat-input:focus { border-color: #6c63ff; }
    .send-btn {
      background: #6c63ff; border: none; border-radius: 50%;
      width: 36px; height: 36px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; align-self: flex-end;
    }
    .send-btn:hover { background: #5a52e0; }
  </style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="joinScreen">
  <div class="join-card">
    <h1>🎬 Watch Party</h1>
    <p>Dost ke saath saath video dekho aur chat karo</p>

    <input type="text" id="nameInput" placeholder="Tera naam..." maxlength="20" />

    <div style="display:flex;gap:10px;margin-bottom:12px;">
      <input type="text" id="roomInput" placeholder="Room ID (koi bhi likho)" style="flex:1;margin:0;" />
    </div>

    <button class="btn-primary" onclick="joinRoom()">Room Join Karo →</button>

    <div class="divider">— ya —</div>

    <button class="btn-primary" style="background:#252535;border:1px solid #333;" onclick="createRoom()">
      Naya Room Banao 🎉
    </button>

    <p style="margin-top:16px;font-size:12px;color:#555;">
      Room ID share karo apne dost ke saath — woh bhi same ID se join kare
    </p>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen">
  <div class="topbar">
    <h2>🎬 Watch Party</h2>
    <div class="room-badge" onclick="copyRoomId()" title="Click to copy Room ID">
      Room: <span id="roomIdDisplay"></span> 📋
    </div>
    <div class="online-pill">
      <span class="live-dot"></span>
      <span id="onlineCount">1</span> online
    </div>
  </div>

  <div class="main-area">
    <!-- VIDEO SIDE -->
    <div class="video-area">
      <div class="video-container" id="videoContainer"
           ondragover="event.preventDefault()"
           ondrop="handleDrop(event)"
           onclick="handleVideoClick(event)">
        <video id="mainVideo"></video>
        <div class="video-placeholder" id="placeholder">
          <div class="icon">📂</div>
          <p>Apna video yahan click karke<br>ya drag karke load karo</p>
        </div>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" onclick="seekVideo(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
        <button class="ctrl-btn" onclick="requestSync()">🔄 Sync</button>
        <input type="file" id="fileInput" accept="video/*" onchange="loadVideo(event)">
        <button class="ctrl-btn" onclick="document.getElementById('fileInput').click()">📂 Load Video</button>
        <span class="time-info" id="timeDisplay">0:00 / 0:00</span>
      </div>

      <div class="reactions-bar">
        <span style="font-size:12px;color:#555;align-self:center;margin-right:4px;">React:</span>
        <button class="react-btn" onclick="sendReaction('😂')">😂</button>
        <button class="react-btn" onclick="sendReaction('😮')">😮</button>
        <button class="react-btn" onclick="sendReaction('❤️')">❤️</button>
        <button class="react-btn" onclick="sendReaction('🔥')">🔥</button>
        <button class="react-btn" onclick="sendReaction('👏')">👏</button>
        <button class="react-btn" onclick="sendReaction('😭')">😭</button>
      </div>
    </div>

    <!-- CHAT PANEL -->
    <div class="chat-panel">
      <div class="chat-title">💬 Live Chat</div>
      <div class="messages" id="messageList"></div>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput"
          placeholder="Message likho..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Socket.io client library -->
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = '';
  let myRoomId = '';
  let video = document.getElementById('mainVideo');
  let isSyncing = false; // flag to avoid infinite sync loops

  // ===== JOIN FUNCTIONS =====

  function generateRoomId() {
    // 6 character random room ID
    return Math.random().toString(36).substring(2, 8).toUpperCase();
  }

  function createRoom() {
    let name = document.getElementById('nameInput').value.trim();
    if (!name) { alert('Pehle naam likho!'); return; }
    document.getElementById('roomInput').value = generateRoomId();
    joinRoom();
  }

  function joinRoom() {
    let name = document.getElementById('nameInput').value.trim();
    let roomId = document.getElementById('roomInput').value.trim().toUpperCase();
    if (!name) { alert('Naam likho pehle!'); return; }
    if (!roomId) { alert('Room ID likho ya Naya Room banao!'); return; }

    myName = name;
    myRoomId = roomId;

    socket.emit('join-room', { roomId, userName: name });

    document.getElementById('joinScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    document.getElementById('roomIdDisplay').textContent = roomId;
  }

  function copyRoomId() {
    navigator.clipboard.writeText(myRoomId).then(() => {
      alert('Room ID copy ho gaya: ' + myRoomId + '\nApne dost ko bhejo!');
    });
  }

  // ===== SOCKET EVENTS =====

  socket.on('user-joined', ({ userName, users, videoState }) => {
    updateOnlineCount(users.length);
    addSystemMsg('🟢 ' + userName + ' room mein aa gaya!');
    // Sync video state if needed
    if (videoState && video.src) {
      isSyncing = true;
      video.currentTime = videoState.time;
      if (videoState.isPlaying) video.play(); else video.pause();
      setTimeout(() => isSyncing = false, 500);
    }
  });

  socket.on('user-left', ({ userName, users }) => {
    updateOnlineCount(users.length);
    addSystemMsg('🔴 ' + userName + ' chala gaya');
  });

  socket.on('chat-message', ({ userName, message, time }) => {
    let type = userName === myName ? 'me' : 'other';
    addMsg(userName, type, message, time);
  });

  socket.on('reaction', ({ emoji, userName }) => {
    showFloatingReaction(emoji);
    addSystemMsg(userName + ' ne react kiya: ' + emoji);
  });

  socket.on('video-play', ({ currentTime, userName }) => {
    isSyncing = true;
    video.currentTime = currentTime;
    video.play();
    updatePlayBtn(true);
    addSystemMsg('▶ ' + userName + ' ne play kiya');
    setTimeout(() => isSyncing = false, 500);
  });

  socket.on('video-pause', ({ currentTime, userName }) => {
    isSyncing = true;
    video.currentTime = currentTime;
    video.pause();
    updatePlayBtn(false);
    addSystemMsg('⏸ ' + userName + ' ne pause kiya');
    setTimeout(() => isSyncing = false, 500);
  });

  socket.on('video-seek', ({ currentTime, userName }) => {
    isSyncing = true;
    video.currentTime = currentTime;
    addSystemMsg('⏩ ' + userName + ' ne seek kiya ' + formatTime(currentTime) + ' pe');
    setTimeout(() => isSyncing = false, 500);
  });

  socket.on('sync-state', ({ time, isPlaying }) => {
    isSyncing = true;
    video.currentTime = time;
    if (isPlaying) video.play(); else video.pause();
    updatePlayBtn(isPlaying);
    addSystemMsg('✅ Sync ho gaya ' + formatTime(time) + ' pe!');
    setTimeout(() => isSyncing = false, 500);
  });

  // ===== VIDEO FUNCTIONS =====

  function loadVideo(event) {
    let file = event.target.files[0];
    if (!file) return;
    video.src = URL.createObjectURL(file);
    video.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    video.onloadedmetadata = updateTime;
    video.ontimeupdate = () => { updateTime(); updateProgress(); };
    addSystemMsg('📂 Video load hua: ' + file.name);
  }

  function handleDrop(e) {
    e.preventDefault();
    let file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('video/')) {
      video.src = URL.createObjectURL(file);
      video.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      video.onloadedmetadata = updateTime;
      video.ontimeupdate = () => { updateTime(); updateProgress(); };
      addSystemMsg('📂 Video drop hua: ' + file.name);
    }
  }

  function handleVideoClick(e) {
    // Only toggle if click is on video, not placeholder
    if (e.target === video) togglePlay();
  }

  function togglePlay() {
    if (!video.src) { document.getElementById('fileInput').click(); return; }
    if (video.paused) {
      video.play();
      if (!isSyncing) socket.emit('video-play', { roomId: myRoomId, currentTime: video.currentTime });
      updatePlayBtn(true);
    } else {
      video.pause();
      if (!isSyncing) socket.emit('video-pause', { roomId: myRoomId, currentTime: video.currentTime });
      updatePlayBtn(false);
    }
  }

  function seekVideo(e) {
    if (!video.duration) return;
    let rect = e.currentTarget.getBoundingClientRect();
    let pct = (e.clientX - rect.left) / rect.width;
    video.currentTime = pct * video.duration;
    if (!isSyncing) socket.emit('video-seek', { roomId: myRoomId, currentTime: video.currentTime });
  }

  function requestSync() {
    socket.emit('request-sync', { roomId: myRoomId });
    addSystemMsg('🔄 Sync maanga...');
  }

  function updatePlayBtn(isPlaying) {
    document.getElementById('playBtn').textContent = isPlaying ? '⏸ Pause' : '▶ Play';
  }

  function updateProgress() {
    if (!video.duration) return;
    document.getElementById('progressFill').style.width = (video.currentTime / video.duration * 100) + '%';
  }

  function updateTime() {
    document.getElementById('timeDisplay').textContent =
      formatTime(video.currentTime) + ' / ' + formatTime(video.duration || 0);
  }

  function formatTime(s) {
    if (!s || isNaN(s)) return '0:00';
    let m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  // ===== REACTIONS =====

  function sendReaction(emoji) {
    socket.emit('reaction', { roomId: myRoomId, emoji, userName: myName });
    showFloatingReaction(emoji);
  }

  function showFloatingReaction(emoji) {
    let el = document.createElement('div');
    el.className = 'reaction-float';
    el.textContent = emoji;
    let container = document.getElementById('videoContainer');
    let rect = container.getBoundingClientRect();
    el.style.left = (20 + Math.random() * (rect.width - 80)) + 'px';
    el.style.bottom = '60px';
    container.appendChild(el);
    setTimeout(() => el.remove(), 2100);
  }

  // ===== CHAT FUNCTIONS =====

  function sendMessage() {
    let inp = document.getElementById('chatInput');
    let text = inp.value.trim();
    if (!text) return;
    socket.emit('chat-message', { roomId: myRoomId, message: text, userName: myName });
    inp.value = '';
    inp.style.height = 'auto';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 80) + 'px';
  }

  function addMsg(name, type, text, time) {
    let initials = name.substring(0, 2).toUpperCase();
    let msgTime = time || new Date().toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
    let div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = `
      <div class="avatar ${type}">${initials}</div>
      <div class="msg-body">
        <div class="msg-name">${name}</div>
        <div class="msg-text">${escapeHtml(text)}</div>
        <div class="msg-time">${msgTime}</div>
      </div>`;
    let list = document.getElementById('messageList');
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
  }

  function addSystemMsg(text) {
    let div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    let list = document.getElementById('messageList');
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
  }

  function updateOnlineCount(count) {
    document.getElementById('onlineCount').textContent = count;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Enter key from join screen
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('roomInput').focus();
  });
  document.getElementById('roomInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
</script>
</body>
</html>
